name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Set up docs directory
        run: |
          rm -rf docs
          mkdir docs
          cp README.md docs/README.md
          ln -s "$GITHUB_WORKSPACE/ai-infra" docs/ai-infra
          ln -s "$GITHUB_WORKSPACE/cs336" docs/cs336
          ln -s "$GITHUB_WORKSPACE/c++" "docs/c++"
          ln -s "$GITHUB_WORKSPACE/reference" docs/reference

      - name: Deploy
        run: mkdocs gh-deploy --force
