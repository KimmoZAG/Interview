site_name: Interview Notes
site_url: https://kimmozag.github.io/Interview/
repo_url: https://github.com/KimmoZAG/Interview
repo_name: KimmoZAG/Interview

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - admonition
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search:
      separator: '[\s\u200b\-]'

nav:
  - 首页: README.md

  - CS336:
    - 索引: cs336/00-index.md
    - 课程说明: cs336/README.md
